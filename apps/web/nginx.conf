server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.csr.html;

  # Long-cache fingerprinted static assets.
  location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico|webp|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: client-side routing renders every route from index.csr.html.
  location / {
    try_files $uri /index.csr.html;
  }
}
