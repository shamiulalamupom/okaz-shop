services:
  postgres:
    image: postgres:16-alpine
    container_name: okaz-postgres
    environment:
      POSTGRES_DB: okaz_auth
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d okaz_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro

  mongo:
    image: mongo:8.0
    container_name: okaz-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-example}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --host localhost --port 27017 --username "$$MONGO_INITDB_ROOT_USERNAME" --password "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --quiet --eval "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)"',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mongo-data:/data/db

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: okaz-gateway
    depends_on:
      auth:
        condition: service_healthy
      products:
        condition: service_healthy
      cart:
        condition: service_healthy
      orders:
        condition: service_healthy
    environment:
      GATEWAY_PORT: 4000
      AUTH_SERVICE_URL: http://auth:4001
      PRODUCTS_SERVICE_URL: http://products:4002
      CART_SERVICE_URL: http://cart:4003
      ORDERS_SERVICE_URL: http://orders:4004
      GATEWAY_SERVICE_URL: http://gateway:4000
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-replace-with-a-long-random-secret-at-least-32-characters}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-okaz-auth}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-okaz-api}
      AUTH_REQUEST_MAX_BYTES: ${AUTH_REQUEST_MAX_BYTES:-1024}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-5}
      LOGIN_RATE_LIMIT_WINDOW_MS: ${LOGIN_RATE_LIMIT_WINDOW_MS:-60000}
      NODE_ENV: development
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4000/live'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: okaz-auth
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTH_PORT: 4001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/okaz_auth?schema=public
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-replace-with-a-long-random-secret-at-least-32-characters}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-okaz-auth}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-okaz-api}
      AUTH_JWT_EXPIRES_IN_SECONDS: ${AUTH_JWT_EXPIRES_IN_SECONDS:-3600}
      AUTH_REQUEST_MAX_BYTES: ${AUTH_REQUEST_MAX_BYTES:-1024}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-admin@example.com}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-Admin1234!}
      NODE_ENV: development
    command: sh -c "pnpm prisma:migrate:deploy && pnpm start"
    expose:
      - "4001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4001/live'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  products:
    build:
      context: .
      dockerfile: apps/products/Dockerfile
    container_name: okaz-products
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PRODUCTS_PORT: 4002
      MONGO_URI: mongodb://root:example@mongo:27017/okaz_products?authSource=admin
      PRODUCTS_REQUEST_MAX_BYTES: ${PRODUCTS_REQUEST_MAX_BYTES:-1024}
      NODE_ENV: development
    command: sh -c "pnpm start"
    expose:
      - "4002"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4002/live'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  cart:
    build:
      context: .
      dockerfile: apps/cart/Dockerfile
    container_name: okaz-cart
    depends_on:
      postgres:
        condition: service_healthy
      products:
        condition: service_healthy
    environment:
      CART_PORT: 4003
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/okaz_cart?schema=public
      PRODUCTS_SERVICE_URL: http://products:4002
      CART_REQUEST_MAX_BYTES: ${CART_REQUEST_MAX_BYTES:-1024}
      NODE_ENV: development
    command: sh -c "pnpm prisma:migrate:deploy && pnpm start"
    expose:
      - "4003"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4003/live'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  orders:
    build:
      context: .
      dockerfile: apps/orders/Dockerfile
    container_name: okaz-orders
    depends_on:
      postgres:
        condition: service_healthy
      cart:
        condition: service_healthy
      products:
        condition: service_healthy
    environment:
      ORDERS_PORT: 4004
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/okaz_orders?schema=public
      CART_SERVICE_URL: http://cart:4003
      PRODUCTS_SERVICE_URL: http://products:4002
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-usd}
      ORDERS_REQUEST_MAX_BYTES: ${ORDERS_REQUEST_MAX_BYTES:-1024}
      NODE_ENV: development
    command: sh -c "pnpm prisma:migrate:deploy && pnpm start"
    expose:
      - "4004"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4004/live'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  mongo-data:
